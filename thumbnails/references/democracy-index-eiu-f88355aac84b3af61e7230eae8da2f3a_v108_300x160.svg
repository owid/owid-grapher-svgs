<svg
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    style='font-family:Lato, &#x27;Helvetica Neue&#x27;, Helvetica, Arial, &#x27;Liberation Sans&#x27;, sans-serif;font-feature-settings:"liga", "kern", "calt", "lnum";text-rendering:geometricPrecision;-webkit-font-smoothing:antialiased;font-size:14px;background-color:#ffffff'
    width="300"
    height="160"
    viewBox="0 0 300 160"
>
    <defs>
        <style>
            @import url(https://ourworldindata.org/fonts.css);
        </style>
    </defs>
    <defs>
        <pattern
            id="noDataPattern"
            patternUnits="userSpaceOnUse"
            width="4"
            height="4"
            patternTransform="rotate(-45 2 2)"
        >
            <path d="M -1,2 l 6,0" stroke="#ccc" stroke-width="0.7"></path>
        </pattern>
    </defs>
    <g id="chart-area" style="pointer-events: none">
        <line
            id="vertical-zero-line"
            x1="54.15"
            y1="152.00"
            x2="54.15"
            y2="8.00"
            stroke="#999"
            stroke-width="0.5"
        ></line>
        <g id="bars">
            <rect
                class="bar"
                id="Australia"
                x="0"
                y="0"
                transform="translate(54.4, 14.3)"
                width="183"
                height="23.4"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                class="bar"
                id="Botswana"
                x="0"
                y="0"
                transform="translate(54.4, 50.3)"
                width="157.79999999999998"
                height="23.4"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                class="bar"
                id="Argentina"
                x="0"
                y="0"
                transform="translate(54.4, 86.3)"
                width="134.6"
                height="23.4"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                class="bar"
                id="China"
                x="0"
                y="0"
                transform="translate(54.4, 122.3)"
                width="43.6"
                height="23.4"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
        </g>
        <g id="value-labels">
            <text
                x="0"
                y="0"
                transform="translate(242.4, 26)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                8.85
                <tspan fill="#999"></tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(217.2, 62)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                7.63
                <tspan fill="#999"></tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(194, 98)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                6.51
                <tspan fill="#999"></tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(103, 134)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                2.11
                <tspan fill="#999"></tspan>
            </text>
        </g>
        <g id="entity-labels">
            <text
                x="49.4"
                y="29.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="49.4" font-weight="700" fill="#5b5b5b">
                    Australia
                </tspan>
            </text>
            <text
                x="49.4"
                y="65.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="49.4" font-weight="700" fill="#5b5b5b">
                    Botswana
                </tspan>
            </text>
            <text
                x="49.4"
                y="101.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="49.4" font-weight="700" fill="#5b5b5b">
                    Argentina
                </tspan>
            </text>
            <text
                x="49.4"
                y="137.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="49.4" font-weight="700" fill="#5b5b5b">China</tspan>
            </text>
        </g>
    </g>
</svg>
