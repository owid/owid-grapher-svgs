<svg
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    style='font-family:Lato, &#x27;Helvetica Neue&#x27;, Helvetica, Arial, &#x27;Liberation Sans&#x27;, sans-serif;font-feature-settings:"liga", "kern", "calt", "lnum";text-rendering:geometricPrecision;-webkit-font-smoothing:antialiased;font-size:14px;background-color:#ffffff'
    width="300"
    height="160"
    viewBox="0 0 300 160"
>
    <defs>
        <style>
            @import url(https://ourworldindata.org/fonts.css);
        </style>
    </defs>
    <defs>
        <pattern
            id="noDataPattern"
            patternUnits="userSpaceOnUse"
            width="4"
            height="4"
            patternTransform="rotate(-45 2 2)"
        >
            <path d="M -1,2 l 6,0" stroke="#ccc" stroke-width="0.7"></path>
        </pattern>
    </defs>
    <g id="chart-area" style="pointer-events: none">
        <line
            id="vertical-zero-line"
            x1="56.2"
            y1="152"
            x2="56.2"
            y2="8"
            stroke="#999"
            stroke-width="0.5"
        ></line>
        <g id="bars">
            <rect
                id="Slovenia"
                x="0"
                y="0"
                transform="translate(56.4, 16.4)"
                width="204.8"
                height="31.2"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="Greece"
                x="0"
                y="0"
                transform="translate(56.4, 64.4)"
                width="182.4"
                height="31.2"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="Cameroon"
                x="0"
                y="0"
                transform="translate(56.4, 112.4)"
                width="105"
                height="31.2"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
        </g>
        <g id="value-labels">
            <text
                x="0"
                y="0"
                transform="translate(266.2, 32)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                0.77
                <tspan fill="#999"></tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(243.8, 80)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                0.69
                <tspan fill="#999"></tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(166.4, 128)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                0.4
                <tspan fill="#999"></tspan>
            </text>
        </g>
        <g id="entity-labels">
            <text
                x="51.4"
                y="35.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="51.4" font-weight="700" fill="#5b5b5b">
                    Slovenia
                </tspan>
            </text>
            <text
                x="51.4"
                y="83.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="51.4" font-weight="700" fill="#5b5b5b">Greece</tspan>
            </text>
            <text
                x="51.4"
                y="131.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="51.4" font-weight="700" fill="#5b5b5b">
                    Cameroon
                </tspan>
            </text>
        </g>
    </g>
</svg>
