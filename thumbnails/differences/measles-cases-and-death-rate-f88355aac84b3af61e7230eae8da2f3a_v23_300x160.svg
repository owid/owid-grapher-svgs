<svg
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    style='font-family:Lato, &#x27;Helvetica Neue&#x27;, Helvetica, Arial, &#x27;Liberation Sans&#x27;, sans-serif;font-feature-settings:"liga", "kern", "calt", "lnum";text-rendering:geometricPrecision;-webkit-font-smoothing:antialiased;font-size:14px;background-color:#fff'
    width="300"
    height="160"
    viewBox="0 0 300 160"
>
    <defs>
        <style>
            @import url(https://ourworldindata.org/fonts.css);
        </style>
    </defs>
    <defs>
        <pattern
            id="noDataPattern"
            patternUnits="userSpaceOnUse"
            width="4"
            height="4"
            patternTransform="rotate(-45 2 2)"
        >
            <path d="M -1,2 l 6,0" stroke="#ccc" stroke-width="0.7"></path>
        </pattern>
    </defs>
    <g id="chart-area" style="pointer-events: none">
        <line
            id="vertical-zero-line"
            x1="51.45"
            y1="152.00"
            x2="51.45"
            y2="8.00"
            stroke="#999"
            stroke-width="0.5"
        ></line>
        <g id="bars">
            <rect
                id="Case-rate"
                x="0"
                y="0"
                transform="translate(51.7, 33.2)"
                width="209.5"
                height="93.6"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
        </g>
        <g id="value-labels">
            <text
                x="0"
                y="0"
                transform="translate(266.2, 80)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                0.33
                <tspan fill="#999"></tspan>
            </text>
        </g>
        <g id="entity-labels">
            <text
                x="46.7"
                y="83.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="46.7" font-weight="700" fill="#5b5b5b">
                    Case rate
                </tspan>
            </text>
        </g>
    </g>
</svg>
