                y="0"
                transform="translate(65.9, 140)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                3%
                <tspan fill="#999"></tspan>
            </text>
        </g>
        <g id="entity-labels">
