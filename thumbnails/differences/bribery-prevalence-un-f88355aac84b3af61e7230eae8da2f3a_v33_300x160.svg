            </text>
            <text
                x="44.5"
                y="95.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="44.5" font-weight="700" fill="#5b5b5b">Poland</tspan>
            </text>
            <text
                x="44.5"
                y="119.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="44.5" font-weight="700" fill="#5b5b5b">France</tspan>
            </text>
            <text
                x="44.5"
                y="143.9"
                text-anchor="end"
                font-size="10.50"
                opacity="1"
            >
                <tspan x="44.5" font-weight="700" fill="#5b5b5b">Peru</tspan>
            </text>
        </g>
