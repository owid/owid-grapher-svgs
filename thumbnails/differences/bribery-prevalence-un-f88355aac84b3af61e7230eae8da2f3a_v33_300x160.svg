                <tspan fill="#999">in 2020</tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(109.6, 68)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                13%
                <tspan fill="#999">in 2020</tspan>
            </text>
            <text
