                y="0"
                transform="translate(96.8, 92)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                10%
                <tspan fill="#999">in 2021</tspan>
            </text>
            <text
