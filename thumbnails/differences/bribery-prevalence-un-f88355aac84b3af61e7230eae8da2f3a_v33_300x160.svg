                height="15.600000000000001"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="India"
                x="0"
                y="0"
                transform="translate(49.5, 36.2)"
                width="165.2"
                height="15.600000000000001"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="Malaysia"
                x="0"
                y="0"
                transform="translate(49.5, 60.2)"
                width="55.099999999999994"
                height="15.600000000000001"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="Poland"
                x="0"
                y="0"
                transform="translate(49.5, 84.2)"
                width="42.3"
                height="15.600000000000001"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="France"
                x="0"
                y="0"
                transform="translate(49.5, 108.2)"
                width="21.200000000000003"
                height="15.600000000000001"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
            <rect
                id="Peru"
                x="0"
                y="0"
                transform="translate(49.5, 132.2)"
                width="11.399999999999999"
                height="15.600000000000001"
                fill="#4c6a9c"
                opacity="0.8"
                style="transition: height 200ms ease"
            ></rect>
        </g>
        <g id="value-labels">
            <text
                x="0"
                y="0"
                transform="translate(228.2, 20)"
                fill="#5b5b5b"
                dy=".32em"
                text-anchor="start"
                opacity="1"
                font-size="10.5"
                font-weight="400"
            >
                41%
                <tspan fill="#999">in 2019</tspan>
            </text>
            <text
                x="0"
                y="0"
                transform="translate(219.7, 44)"
                fill="#5b5b5b"
                dy=".32em"
